<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sentence Game — Greek</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fafafa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      max-width: 560px;
      width: 100%;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 13px;
      color: #999;
      text-decoration: none;
      margin-bottom: 2rem;
    }

    .back-link:hover { color: #555; }

    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .title {
      font-size: 22px;
      font-weight: 500;
      color: #111;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 13px;
      color: #aaa;
    }

    .divider {
      border: none;
      border-top: 0.5px solid #e0e0e0;
      margin: 1.5rem 0;
    }

    .coming-soon-box {
      background: #fff;
      border: 0.5px solid #e0e0e0;
      border-radius: 14px;
      padding: 3rem 2rem;
      text-align: center;
    }

    .coming-soon-icon {
      font-size: 48px;
      margin-bottom: 1rem;
    }

    .coming-soon-title {
      font-size: 18px;
      font-weight: 500;
      color: #111;
      margin-bottom: 0.5rem;
    }

    .coming-soon-desc {
      font-size: 13px;
      color: #aaa;
      line-height: 1.6;
      max-width: 320px;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <div class="container">
    <a class="back-link" href="index.html">‹ All games</a>
    <div class="header">
      <div class="title">Sentence Game</div>
      <div class="subtitle">Translate and build Greek sentences</div>
    </div>
    <hr class="divider" />
    <div class="coming-soon-box">
      <div class="coming-soon-icon">✍️</div>
      <div class="coming-soon-title">Coming soon</div>
      <div class="coming-soon-desc">
        This game is under construction. Check back soon to practice
        reading and building Greek sentences word by word.
      </div>
    </div>
  </div>
</body>
</html>
